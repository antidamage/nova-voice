# Qwen3-TTS async PCM pipeline for Iridium's single RTX 2080 Ti.
#
# Turing supports the vLLM Triton attention fallback, but it cannot use BF16
# and its driver rejects the nested Code2Wav CUDA-graph capture used by the
# H100-oriented upstream defaults. Eager Code2Wav preserves true async chunks
# while keeping enough GPU memory available for Nova's resident NeMo STT and
# llama.cpp interpretation processes.
async_chunk: true

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      shm_threshold_bytes: 65536
      codec_streaming: true
      connector_get_sleep_s: 0.01
      connector_get_max_wait_first_chunk: 3000
      connector_get_max_wait: 300
      # Chunk size directly sets the text->audio latency floor: satellites
      # can't start playing until a chunk clears the server frame floor and
      # the client jitter-buffer preroll, and the second codec chunk (the
      # one that actually satisfies both, since the first is tiny by design)
      # took ~2s to generate at codec_chunk_frames: 25. Smaller chunks arrive
      # sooner without changing total synthesis time, since generation runs
      # at roughly realtime.
      codec_chunk_frames: 8
      codec_left_context_frames: 72
      # A larger first chunk (vs. the previous 1 frame / ~83ms) is large
      # enough to clear the satellite's playback_preroll_ms on its own,
      # instead of stranding a near-empty first chunk behind the next one.
      initial_codec_chunk_frames: 4

stages:
  - stage_id: 0
    max_num_seqs: 1
    gpu_memory_utilization: 0.23
    trust_remote_code: true
    enable_prefix_caching: true
    async_scheduling: true
    max_num_batched_tokens: 512
    # Nova replies are deliberately capped at about ten words. A 2k context
    # leaves ample speech-code headroom and avoids reserving unused Turing VRAM.
    max_model_len: 2048
    devices: "0"
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.9
      top_k: 50
      max_tokens: 2048
      seed: 42
      repetition_penalty: 1.05
    subtalker_sampling_params:
      do_sample: true
      temperature: 0.9
      top_k: 50
      top_p: 1.0

  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.15
    enforce_eager: true
    trust_remote_code: true
    enable_prefix_caching: false
    async_scheduling: true
    # 4096 flat codec tokens cover well beyond Nova's bounded response length
    # while remaining divisible by Qwen's 16 code groups.
    max_num_batched_tokens: 4096
    max_model_len: 4096
    devices: "0"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.0
