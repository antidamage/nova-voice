# Native PipeWire WebRTC echo-cancellation graph for the Nocturnium satellite.
#
# The installer resolves host-specific source/sink node names and writes a
# generated override.  Leaving target.object unset here is intentional: a
# checked-in PCI id can silently bind to a dummy device on another host.
context.modules = [
    { name = libpipewire-module-echo-cancel
        args = {
            node.latency = 480/48000
            capture.props = {
                node.name = "nova_voice_aec_capture"
            }
            source.props = {
                node.name = "nova_voice_aec"
                node.description = "Nova Voice Echo-Cancelled Microphone"
            }
            sink.props = {
                node.name = "nova_voice_aec_sink"
                node.description = "Nova Voice Echo Reference"
            }
            playback.props = {
                node.name = "nova_voice_aec_playback"
            }
        }
        flags = [ ifexists nofail ]
    }
]
